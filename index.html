<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الجاسوس الذكية 🕵️‍♂️</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: var(--secondary); transform: scale(1.02); }

        ul { list-style: none; padding: 0; text-align: right; }
        li { background: rgba(255, 255, 255, 0.05); padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>🕵️‍♂️ الجاسوس</h1>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="player-name" placeholder="اسم اللاعب...">
            <button onclick="addPlayer()" style="width: auto;">+</button>
        </div>
        <ul id="players-list"></ul>
        
        <div id="game-settings" style="display:none;">
            <select id="category">
                <option value="حيوانات">حيوانات</option>
                <option value="أكلات">أكلات</option>
                <option value="دول عربية">دول عربية</option>
                <option value="أدوات منزلية">أدوات منزلية</option>
            </select>
            <button id="start-btn" onclick="startGame()">ابدأ اللعبة 🚀</button>
            <div id="ai-loading" class="loader"></div>
        </div>
    </div>

    <div id="pass-screen" class="screen">
        <h2 id="turn-text"></h2>
        <p>لا تشاهد الكلمة إلا لوحدك!</p>
        <button onclick="showRole()">اكشف الكلمة</button>
    </div>

    <div id="role-screen" class="screen">
        <h3>كلمتك هي:</h3>
        <h1 id="role-display" style="font-size: 2.5rem; margin: 30px 0;"></h1>
        <button onclick="nextPlayer()">تم، اخفِ الكلمة</button>
    </div>

    <div id="timer-screen" class="screen">
        <h1>ابدأوا الكلام! 🗣️</h1>
        <p>الجاسوس يحاول التخفي والبقية يحاولون كشفه.</p>
        <button onclick="restartGame()">لعبة جديدة 🔄</button>
    </div>
</div>

<script>
    const GEMINI_API_KEY = 'AIzaSyAvo2K-ECMnYfbaemIu2oh8kzg1rfMhMUc';
    let players = [];
    let spyIndex = -1;
    let currentWord = '';
    let currentPlayerIndex = 0;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function addPlayer() {
        const input = document.getElementById('player-name');
        const name = input.value.trim();
        if (name) {
            players.push(name);
            const list = document.getElementById('players-list');
            const li = document.createElement('li');
            li.innerHTML = `<span>${name}</span> <span style="cursor:pointer" onclick="this.parentElement.remove(); players.splice(players.indexOf('${name}'),1); checkMinPlayers()">❌</span>`;
            list.appendChild(li);
            input.value = '';
            checkMinPlayers();
        }
    }

    function checkMinPlayers() {
        document.getElementById('game-settings').style.display = players.length >= 3 ? 'block' : 'none';
    }

    async function startGame() {
        const loader = document.getElementById('ai-loading');
        const btn = document.getElementById('start-btn');
        loader.style.display = 'block';
        btn.style.display = 'none';

        spyIndex = Math.floor(Math.random() * players.length);
        const category = document.getElementById('category').value;
        
        try {
            const prompt = `أعطني اسم شيء واحد فقط ينتمي لفئة ${category} باللغة العربية، بدون شرح، كلمة واحدة فقط.`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            if (!res.ok) throw new Error();
            const data = await res.json();
            currentWord = data.candidates[0].content.parts[0].text.trim();
        } catch (error) {
            currentWord = "بيتزا"; // كلمة احتياطية
        }

        loader.style.display = 'none';
        btn.style.display = 'block';
        currentPlayerIndex = 0;
        startPassing();
    }

    function startPassing() {
        if (currentPlayerIndex < players.length) {
            document.getElementById('turn-text').innerText = `مرر الجهاز لـ : ${players[currentPlayerIndex]}`;
            showScreen('pass-screen');
        } else {
            showScreen('timer-screen');
        }
    }

    function showRole() {
        const display = document.getElementById('role-display');
        if (currentPlayerIndex === spyIndex) {
            display.innerText = "أنت الجاسوس 🕵️‍♂️";
            display.style.color = "#ff7675";
        } else {
            display.innerText = currentWord;
            display.style.color = "#55efc4";
        }
        showScreen('role-screen');
    }

    function nextPlayer() {
        currentPlayerIndex++;
        startPassing();
    }

    function restartGame() {
        players = [];
        document.getElementById('players-list').innerHTML = '';
        checkMinPlayers();
        showScreen('setup-screen');
    }
</script>
</body>
</html>
